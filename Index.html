
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;padding:20px;background:#e7dfd5;font-family:Arial}
.container{display:grid;grid-template-columns:260px 1fr 300px;gap:15px}
.card{background:#fff;border-radius:12px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
input,button{padding:10px;border-radius:8px}
input{width:100%;box-sizing:border-box;margin-bottom:10px}
button{border:none;background:#5c6655;color:#fff;cursor:pointer;width:100%}
.table-wrap{overflow:auto}
table{border-collapse:collapse;min-width:1100px;width:100%}
th,td{border:1px solid #ccc;padding:4px;text-align:center}
.habit-name{text-align:left;font-weight:bold;min-width:180px}
.stats{display:flex;flex-direction:column;gap:15px}
.big{font-size:34px;font-weight:bold}
@media(max-width:1000px){.container{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="container">

<div class="card">
<h2>Habit Tracker</h2>
<input id="habitInput" placeholder="Tambah kegiatan">
<button onclick="addHabit()">Tambah Kegiatan</button>
<p>Total tracking 30 hari per kegiatan.</p>
</div>

<div class="card">
<h2>Checklist 30 Hari</h2>
<div class="table-wrap">
<table id="habitTable">
<thead><tr><th>Kegiatan</th></tr></thead>
<tbody></tbody>
</table>
</div>
</div>

<div class="stats">
<div class="card"><h3>Total Kegiatan</h3><div class="big" id="totalHabits">0</div></div>
<div class="card"><h3>Total Complete</h3><div class="big" id="completedHabits">0</div></div>
<div class="card"><h3>Total Uncomplete</h3><div class="big" id="uncompletedHabits">0</div></div>
<div class="card"><h3>Chart</h3><canvas id="barChart"></canvas></div>
<div class="card"><h3>Chart</h3><canvas id="lineChart"></canvas></div>
</div>

</div>

<script>
const head=document.querySelector("#habitTable thead tr");
for(let i=1;i<=30;i++){
 let th=document.createElement("th");
 th.textContent=i;
 head.appendChild(th);
}

let habits=JSON.parse(localStorage.getItem("habitData")||"[]");

function save(){
 localStorage.setItem("habitData",JSON.stringify(habits));
}

function addHabit(){
 const input=document.getElementById("habitInput");
 const name=input.value.trim();
 if(!name)return;

 habits.push({
   name:name,
   days:Array(30).fill(false)
 });

 input.value="";
 render();
}

function toggleHabit(h,d){
 habits[h].days[d]=!habits[h].days[d];
 render(false);
}

function render(rebuild=true){

 const body=document.querySelector("#habitTable tbody");

 if(rebuild){
  body.innerHTML="";

  habits.forEach((habit,h)=>{
   const tr=document.createElement("tr");
   let html='<td class="habit-name">'+habit.name+'</td>';

   habit.days.forEach((v,d)=>{
    html+=`<td><input type="checkbox" ${v?"checked":""}
    onchange="toggleHabit(${h},${d})"></td>`;
   });

   tr.innerHTML=html;
   body.appendChild(tr);
  });
 }else{
  render(true);
  return;
 }

 document.getElementById("totalHabits").textContent=habits.length;

 const completed=habits.reduce((a,h)=>
 a+h.days.filter(Boolean).length,0);

 const total=habits.length*30;

 document.getElementById("completedHabits").textContent=completed;
 document.getElementById("uncompletedHabits").textContent=total-completed;

 updateCharts();
 save();
}

const barChart=new Chart(document.getElementById("barChart"),{
 type:"bar",
 data:{labels:[],datasets:[{label:"Complete",data:[]}]},
 options:{responsive:true}
});

const lineChart=new Chart(document.getElementById("lineChart"),{
 type:"line",
 data:{labels:[],datasets:[{label:"Progress",data:[],tension:0.4}]},
 options:{responsive:true}
});

function updateCharts(){

 const perHabit=habits.map(h=>h.days.filter(Boolean).length);

 barChart.data.labels=habits.map(h=>h.name);
 barChart.data.datasets[0].data=perHabit;
 barChart.update();

 let progress=[];

 for(let day=0;day<30;day++){
  let done=0;

  habits.forEach(h=>{
   if(h.days[day]) done++;
  });

  let percent=habits.length?
   Math.round(done/habits.length*100):0;

  progress.push(percent);
 }

 lineChart.data.labels=Array.from({length:30},(_,i)=>"H"+(i+1));
 lineChart.data.datasets[0].data=progress;
 lineChart.update();
}

render();
</script>
<center>
  &copy;WONKA STUDIO
</center>
</body>
</html>
