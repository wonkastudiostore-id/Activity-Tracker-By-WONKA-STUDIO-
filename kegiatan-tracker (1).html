<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kegiatan Tracker Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;padding:20px;background:#e7dfd5;font-family:Arial}
.container{display:grid;grid-template-columns:260px 1fr 300px;gap:15px}
.card{background:#fff;border-radius:12px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
input,button{padding:10px;border-radius:8px}
input{width:100%;box-sizing:border-box;margin-bottom:10px}
button{border:none;background:#5c6655;color:#fff;cursor:pointer;width:100%}
.table-wrap{overflow:auto}
table{border-collapse:collapse;min-width:1100px;width:100%}
th,td{border:1px solid #ccc;padding:4px;text-align:center}
.kegiatan-name{text-align:left;font-weight:bold;min-width:180px}
.name-cell{display:flex;align-items:center;gap:6px;padding:4px}
.name-text{flex:1;text-align:left;font-weight:bold}
.btn-rename{background:#4a7fa5;color:#fff;border:none;border-radius:6px;padding:3px 7px;cursor:pointer;font-size:11px;white-space:nowrap}
.btn-delete{background:#b94a4a;color:#fff;border:none;border-radius:6px;padding:3px 7px;cursor:pointer;font-size:11px;white-space:nowrap}
.stats{display:flex;flex-direction:column;gap:15px}
.big{font-size:34px;font-weight:bold}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:320px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.modal h3{margin:0 0 14px}
.modal input{width:100%;box-sizing:border-box;margin-bottom:12px}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1}
.btn-cancel{background:#aaa}
@media(max-width:1000px){.container{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="container">

  <div class="card">
    <h2>Kegiatan Tracker</h2>
    <input id="kegiatanInput" placeholder="Tambah kegiatan">
    <button onclick="addKegiatan()">Tambah Kegiatan</button>
    <p>Total tracking 30 hari per kegiatan.</p>
  </div>

  <div class="card">
    <h2>Checklist 30 Hari</h2>
    <div class="table-wrap">
      <table id="kegiatanTable">
        <thead><tr><th>Kegiatan</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="stats">
    <div class="card"><h3>Total Kegiatan</h3><div class="big" id="totalKegiatan">0</div></div>
    <div class="card"><h3>Total Complete</h3><div class="big" id="completedKegiatan">0</div></div>
    <div class="card"><h3>Total Uncomplete</h3><div class="big" id="uncompletedKegiatan">0</div></div>
    <div class="card"><h3>Chart</h3><canvas id="barChart"></canvas></div>
    <div class="card"><h3>Chart</h3><canvas id="lineChart"></canvas></div>
  </div>

</div>

<!-- Modal Rename -->
<div class="modal-overlay" id="renameModal">
  <div class="modal">
    <h3>Rename Kegiatan</h3>
    <input id="renameInput" placeholder="Nama baru">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeRename()">Batal</button>
      <button onclick="confirmRename()">Simpan</button>
    </div>
  </div>
</div>

<!-- Modal Konfirmasi Delete -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>Hapus Kegiatan?</h3>
    <p id="deleteDesc" style="margin:0 0 16px"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDelete()">Batal</button>
      <button style="background:#b94a4a" onclick="confirmDelete()">Hapus</button>
    </div>
  </div>
</div>

<script>
const head=document.querySelector("#kegiatanTable thead tr");
for(let i=1;i<=30;i++){
  let th=document.createElement("th");
  th.textContent=i;
  head.appendChild(th);
}

let kegiatan=JSON.parse(localStorage.getItem("kegiatanData")||"[]");
let renameIndex=-1;
let deleteIndex=-1;

function save(){
  localStorage.setItem("kegiatanData",JSON.stringify(kegiatan));
}

function addKegiatan(){
  const input=document.getElementById("kegiatanInput");
  const name=input.value.trim();
  if(!name)return;
  kegiatan.push({name:name,days:Array(30).fill(false)});
  input.value="";
  render();
}

function toggleKegiatan(k,d){
  kegiatan[k].days[d]=!kegiatan[k].days[d];
  render();
}

function openRename(k){
  renameIndex=k;
  document.getElementById("renameInput").value=kegiatan[k].name;
  document.getElementById("renameModal").classList.add("active");
  setTimeout(()=>document.getElementById("renameInput").focus(),50);
}
function closeRename(){
  document.getElementById("renameModal").classList.remove("active");
  renameIndex=-1;
}
function confirmRename(){
  const val=document.getElementById("renameInput").value.trim();
  if(!val)return;
  kegiatan[renameIndex].name=val;
  closeRename();
  render();
}

function openDelete(k){
  deleteIndex=k;
  document.getElementById("deleteDesc").textContent='Yakin ingin menghapus "'+kegiatan[k].name+'"?';
  document.getElementById("deleteModal").classList.add("active");
}
function closeDelete(){
  document.getElementById("deleteModal").classList.remove("active");
  deleteIndex=-1;
}
function confirmDelete(){
  kegiatan.splice(deleteIndex,1);
  closeDelete();
  render();
}

document.getElementById("renameModal").addEventListener("click",function(e){
  if(e.target===this)closeRename();
});
document.getElementById("deleteModal").addEventListener("click",function(e){
  if(e.target===this)closeDelete();
});
document.getElementById("renameInput").addEventListener("keydown",function(e){
  if(e.key==="Enter")confirmRename();
});

function render(){
  const body=document.querySelector("#kegiatanTable tbody");
  body.innerHTML="";

  kegiatan.forEach((item,k)=>{
    const tr=document.createElement("tr");

    const tdName=document.createElement("td");
    tdName.className="kegiatan-name";
    tdName.innerHTML=
      '<div class="name-cell">'+
        '<span class="name-text">'+item.name+'</span>'+
        '<button class="btn-rename" onclick="openRename('+k+')">✏️ Rename</button>'+
        '<button class="btn-delete" onclick="openDelete('+k+')">🗑️ Hapus</button>'+
      '</div>';
    tr.appendChild(tdName);

    item.days.forEach((v,d)=>{
      const td=document.createElement("td");
      const cb=document.createElement("input");
      cb.type="checkbox";
      cb.checked=v;
      cb.onchange=()=>toggleKegiatan(k,d);
      td.appendChild(cb);
      tr.appendChild(td);
    });

    body.appendChild(tr);
  });

  document.getElementById("totalKegiatan").textContent=kegiatan.length;

  const completed=kegiatan.reduce((a,k)=>a+k.days.filter(Boolean).length,0);
  const total=kegiatan.length*30;

  document.getElementById("completedKegiatan").textContent=completed;
  document.getElementById("uncompletedKegiatan").textContent=total-completed;

  updateCharts();
  save();
}

const barChart=new Chart(document.getElementById("barChart"),{
  type:"bar",
  data:{labels:[],datasets:[{label:"Complete",data:[]}]},
  options:{responsive:true}
});

const lineChart=new Chart(document.getElementById("lineChart"),{
  type:"line",
  data:{labels:[],datasets:[{label:"Progress",data:[],tension:0.4}]},
  options:{responsive:true}
});

function updateCharts(){
  barChart.data.labels=kegiatan.map(k=>k.name);
  barChart.data.datasets[0].data=kegiatan.map(k=>k.days.filter(Boolean).length);
  barChart.update();

  let progress=[];
  for(let day=0;day<30;day++){
    let done=kegiatan.filter(k=>k.days[day]).length;
    progress.push(kegiatan.length?Math.round(done/kegiatan.length*100):0);
  }

  lineChart.data.labels=Array.from({length:30},(_,i)=>"H"+(i+1));
  lineChart.data.datasets[0].data=progress;
  lineChart.update();
}

render();
</script>
<center>&copy;WONKA STUDIO</center>
</body>
</html>
